# Nixpacks build config for Railway.
# Installs Tesseract (for OCR) at build time so pytesseract works in production.
[phases.setup]
nixPkgs = ["python311", "tesseract"]

[phases.install]
cmds = ["python -m pip install --upgrade pip", "pip install -r requirements.txt"]

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 300 --preload"
